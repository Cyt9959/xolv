name: xolv
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 🚀 新增：大厂战袍插件
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.4.0"

flutter:
  uses-material-design: true

# ------------------------------------------------------------
# 🎨 战袍配置 A：App 图标生成器
# ------------------------------------------------------------
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 

# ------------------------------------------------------------
# 🎨 战袍配置 B：启动页（Splash Screen）生成器
# ------------------------------------------------------------
flutter_native_splash:
  color: "#FF5E00"
  image: "assets/logo.png"
  android_12:
    color: "#FF5E00"
    icon_background_color: "#FF5E00"
    image: "assets/logo.png"
  fullscreen: true