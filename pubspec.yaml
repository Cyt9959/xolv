name: xolv
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  agora_rtc_engine: ^6.3.2
  app_links: ^6.0.0
  cloud_firestore: ^6.4.1
  cloud_functions: ^6.1.1
  easy_localization: ^3.0.7
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  firebase_storage: ^13.4.1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_fonts: ^6.2.1
  google_sign_in: ^7.2.0
  image: ^4.8.0
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 🚀 新增：大厂战袍插件
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: "^2.4.0"

flutter:
  uses-material-design: true

  # 🚨 CTO 强制登记：必须把你的图片文件夹路径写在这里！
  assets:
    - assets/          # 👈 对应你战袍配置里的 assets/logo.png
    - assets/translations/

# ------------------------------------------------------------
# 🎨 战袍配置 A：App 图标生成器
# ------------------------------------------------------------
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 

# ------------------------------------------------------------
# 🎨 战袍配置 B：启动页（Splash Screen）生成器
# ------------------------------------------------------------
flutter_native_splash:
  color: "#FF5E00"
  image: "assets/logo.png"
  android_12:
    color: "#FF5E00"
    icon_background_color: "#FF5E00"
    image: "assets/logo.png"
  fullscreen: true